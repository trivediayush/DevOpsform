name: Deploy DevOps Intake Form

on:
  push:
    branches: [ main ]

jobs:
  validate-and-prep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate HTML
        uses: html5validator/html5validator-action@v1
        with:
          root: .
          # This checks your index.html for common syntax errors
          
